<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyn's Handmade Accessories</title>
<style>
  body {
    background-color: #fdf2f4; [span_1](start_span)/* Soft rose background - Upgrade: Color[span_1](end_span) */
    font-family: 'Trebuchet MS', sans-serif;
    text-align: center;
    padding: 20px;
    color: #333;
  }

  .container {
    background: white;
    max-width: 650px;
    margin: 0 auto;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1); [span_2](start_span)/* Creativity & Design[span_2](end_span) */
  }

  h1 {
    color: #b8860b; [span_3](start_span)/* Dark Goldenrod - Upgrade: Color[span_3](end_span) */
    border-bottom: 2px solid #b8860b;
    display: inline-block;
    padding-bottom: 10px;
    margin-bottom: 10px;
  }

  .slogan {
    color: #5d5d5d;
    font-style: italic;
    font-size: 1.1em;
    margin-bottom: 30px; [span_4](start_span)/* Upgrade: Slogan[span_4](end_span) */
  }

  ul {
    list-style-type: "✨ "; 
    text-align: left;
    display: inline-block;
    padding: 0;
  }

  li {
    margin: 15px 0;
    font-size: 1.2em;
    font-weight: 500;
  }

  .price {
    color: #b8860b;
    font-weight: bold;
    margin-left: 10px; [span_5](start_span)/* Upgrade: Prices[span_5](end_span) */
  }

  /* Registration Form Styling */
  .registration-form {
    margin-top: 40px;
    text-align: left;
    background: #f9f9f9;
    padding: 25px;
    border-radius: 15px;
    border: 1px solid #eee;
  }

  .registration-form h2 {
    color: #b8860b;
    font-size: 1.4em;
    margin-top: 0;
  }

  .form-group {
    margin-bottom: 15px;
  }

  label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
  }

  input[type="text"], input[type="email"], select {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-sizing: border-box; 
  }

  button {
    background-color: #b8860b;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    width: 100%;
    font-size: 1em;
  }

  button:hover {
    background-color: #8b6508;
  }

  .contact-section {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px dashed #ccc;
  }

  a {
    color: #b8860b;
    font-weight: bold;
    text-decoration: underline; [span_6](start_span)/* Functionality[span_6](end_span) */
  }
</style>
</head>
<body>

  <div class="container">
    <h1>Lyn's Handmade Accessories</h1>
    <p class="slogan">Handmade accessories made with love.</p>

    <ul>
      <li>Magical Pink Phone Charm <span class="price">₱70</span></li>
      <li>Song Inspired Bracelet <span class="price">₱65</span></li>
      <li>Divine Aura Necklace <span class="price">₱85</span></li>
    </ul>

    <div class="registration-form">
      <h2>Join Our Member's Club</h2>
      <form>
        <div class="form-group">
          <label for="name">Full Name:</label>
          <input type="text" id="name" name="name" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address:</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="interest">Favorite Accessory:</label>
          <select id="interest" name="interest">
            <option value="charm">Phone Charms</option>
            <option value="bracelet">Bracelets</option>
            <option value="necklace">Necklaces</option>
          </select>
        </div>
        <button type="submit">Sign Up Now</button>
      </form>
    </div>

    <div class="contact-section">
      <p>Contact us: <a href="https://www.facebook.com/share/16r9KAq4Wn/">Click Here to Visit Our Facebook</a></p>
    </div>
  </div>

</body>
</html>
